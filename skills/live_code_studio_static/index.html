<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Code Studio - Alice 即時代碼編輯器</title>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; overflow: hidden; }
        .container { display: flex; height: 100vh; }

        /* 側邊欄 - 樹狀目錄 */
        .sidebar { width: 280px; min-width: 280px; background: #252526; border-right: 1px solid #3c3c3c; display: flex; flex-direction: column; }
        .sidebar-header { padding: 14px 18px; background: #2d2d2d; border-bottom: 1px solid #3c3c3c; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #bbb; display: flex; align-items: center; gap: 8px; }
        .sidebar-header .count { font-size: 11px; color: #858585; font-weight: 400; margin-left: auto; }
        .file-tree { flex: 1; overflow-y: auto; padding: 6px 0; }

        /* 樹狀節點 */
        .tree-node { user-select: none; }
        .tree-row { display: flex; align-items: center; padding: 4px 12px; cursor: pointer; font-size: 13px; gap: 4px; transition: background 0.12s; border-left: 3px solid transparent; }
        .tree-row:hover { background: #2a2d2e; }
        .tree-row.active { background: #37373d; color: #fff; border-left-color: #007acc; }
        .tree-row .arrow { width: 16px; text-align: center; font-size: 10px; color: #858585; transition: transform 0.15s; flex-shrink: 0; }
        .tree-row .arrow.expanded { transform: rotate(90deg); }
        .tree-row .arrow.hidden { visibility: hidden; }
        .tree-row .icon { font-size: 14px; flex-shrink: 0; margin-right: 4px; }
        .tree-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-row .size { font-size: 11px; color: #858585; margin-left: 8px; flex-shrink: 0; }
        .tree-children { display: none; }
        .tree-children.open { display: block; }

        /* 主區域 */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .toolbar { padding: 8px 18px; background: #2d2d2d; border-bottom: 1px solid #3c3c3c; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar button { padding: 5px 12px; background: #0e639c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
        .toolbar button:hover { background: #1177bb; }
        .toolbar button:active { transform: scale(0.97); }
        .toolbar button.danger { background: #a1260d; }
        .toolbar button.danger:hover { background: #c5301a; }
        .toolbar .file-path { font-size: 12px; color: #858585; margin-left: 8px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toolbar .status { font-size: 12px; color: #858585; white-space: nowrap; }
        .editor-container { flex: 1; position: relative; min-height: 0; }
        #editor { width: 100%; height: 100%; }

        /* Diff 面板 */
        .diff-panel { height: 220px; min-height: 120px; border-top: 1px solid #3c3c3c; display: none; resize: vertical; overflow: hidden; }
        .diff-panel.visible { display: flex; flex-direction: column; }
        .diff-header { padding: 6px 16px; background: #2d2d2d; border-bottom: 1px solid #3c3c3c; font-size: 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .diff-header .badge { padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .badge.added { background: #1b5e20; color: #a5d6a7; }
        .badge.removed { background: #b71c1c; color: #ef9a9a; }
        .diff-header .close-btn { margin-left: auto; cursor: pointer; color: #858585; font-size: 14px; padding: 2px 6px; border-radius: 3px; }
        .diff-header .close-btn:hover { background: #3c3c3c; color: #fff; }
        #diff-editor { flex: 1; min-height: 0; }

        /* 載入動畫 */
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 14px; color: #858585; gap: 10px; }
        .loading .spinner { width: 20px; height: 20px; border: 2px solid #3c3c3c; border-top-color: #0e639c; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 空狀態 */
        .empty-state { padding: 24px 16px; text-align: center; color: #858585; font-size: 13px; }

        /* 滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* 響應式 */
        @media (max-width: 768px) {
            .sidebar { width: 200px; min-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                📂 專案檔案
                <span class="count" id="fileCount"></span>
            </div>
            <div class="file-tree" id="fileTree">
                <div class="loading"><div class="spinner"></div>載入中...</div>
            </div>
        </div>
        <div class="main">
            <div class="toolbar">
                <button onclick="saveFile()">💾 儲存</button>
                <button onclick="showDiff()">📊 差異</button>
                <button onclick="refreshFiles()">🔄 重整</button>
                <span class="file-path" id="filePath">未選擇檔案</span>
                <span class="status" id="statusBar">就緒</span>
            </div>
            <div class="editor-container">
                <div id="editor"></div>
            </div>
            <div class="diff-panel" id="diffPanel">
                <div class="diff-header">
                    <span>📊 差異對比</span>
                    <span class="badge added">🟢 新增</span>
                    <span class="badge removed">🔴 刪除</span>
                    <span class="close-btn" onclick="closeDiff()">✕</span>
                </div>
                <div id="diff-editor"></div>
            </div>
        </div>
    </div>

    <script>
        let editor = null;
        let diffEditor = null;
        let currentFile = null;
        let fileContent = '';
        let socket = null;
        let treeData = null;

        // 初始化 Socket.IO
        function initSocket() {
            socket = io();
            socket.on('file_changed', function(data) {
                setStatus('📝 檔案已變更: ' + data.path);
                if (data.path === currentFile) {
                    loadFile(currentFile);
                }
            });
            socket.on('file_saved', function(data) {
                if (data.status === 'ok') {
                    setStatus('✅ 已儲存: ' + data.path);
                } else {
                    setStatus('❌ 儲存失敗: ' + data.message);
                }
            });
        }

        // 初始化 Monaco Editor
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: '// 選擇一個檔案開始編輯...',
                language: 'python',
                theme: 'vs-dark',
                fontSize: 14,
                lineNumbers: 'on',
                minimap: { enabled: true },
                automaticLayout: true,
                scrollBeyondLastLine: false,
                tabSize: 4,
                wordWrap: 'on',
                smoothScrolling: true,
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: 'on'
            });

            diffEditor = monaco.editor.createDiffEditor(document.getElementById('diff-editor'), {
                theme: 'vs-dark',
                fontSize: 13,
                enableSplitViewResizing: true,
                renderSideBySide: true,
                automaticLayout: true
            });

            initSocket();
            loadFileTree();
        });

        // 遞迴統計檔案數量
        function countFiles(node) {
            if (!node || !node.children) return 0;
            let count = 0;
            node.children.forEach(function(child) {
                if (child.type === 'file') {
                    count++;
                } else if (child.type === 'folder') {
                    count += countFiles(child);
                }
            });
            return count;
        }

        // 渲染樹狀目錄
        function renderTree(data, container, depth) {
            if (!data || !data.children || data.children.length === 0) {
                container.innerHTML = '<div class="empty-state">📂 此資料夾為空</div>';
                return;
            }

            container.innerHTML = '';

            data.children.forEach(function(node) {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'tree-node';

                const row = document.createElement('div');
                row.className = 'tree-row';
                row.style.paddingLeft = (12 + depth * 16) + 'px';

                if (node.type === 'folder') {
                    // 資料夾節點
                    const arrow = document.createElement('span');
                    arrow.className = 'arrow';
                    arrow.textContent = '▶';
                    row.appendChild(arrow);

                    const icon = document.createElement('span');
                    icon.className = 'icon';
                    icon.textContent = '📁';
                    row.appendChild(icon);

                    const name = document.createElement('span');
                    name.className = 'name';
                    name.textContent = node.name;
                    row.appendChild(name);

                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'tree-children';

                    row.onclick = function(e) {
                        e.stopPropagation();
                        const isOpen = childrenDiv.classList.toggle('open');
                        arrow.classList.toggle('expanded', isOpen);
                        icon.textContent = isOpen ? '📂' : '📁';
                    };

                    nodeDiv.appendChild(row);
                    nodeDiv.appendChild(childrenDiv);

                    // 遞迴渲染子節點
                    if (node.children && node.children.length > 0) {
                        const subContainer = document.createElement('div');
                        renderTree(node, subContainer, depth + 1);
                        childrenDiv.appendChild(subContainer);
                    } else {
                        childrenDiv.innerHTML = '<div class="empty-state" style="padding:8px 16px 8px ' + (12 + (depth + 1) * 16) + 'px;font-size:12px;">此資料夾為空</div>';
                    }
                } else {
                    // 檔案節點
                    const arrow = document.createElement('span');
                    arrow.className = 'arrow hidden';
                    arrow.textContent = '';
                    row.appendChild(arrow);

                    const icon = document.createElement('span');
                    icon.className = 'icon';
                    icon.textContent = '📄';
                    row.appendChild(icon);

                    const name = document.createElement('span');
                    name.className = 'name';
                    name.textContent = node.name;
                    row.appendChild(name);

                    const size = document.createElement('span');
                    size.className = 'size';
                    size.textContent = formatSize(node.size);
                    row.appendChild(size);

                    row.onclick = function(e) {
                        e.stopPropagation();
                        loadFile(node.path);
                    };
                }

                container.appendChild(nodeDiv);
            });

            // 更新檔案計數
            const countEl = document.getElementById('fileCount');
            if (countEl && treeData) {
                countEl.textContent = countFiles(treeData) + ' 個檔案';
            }
        }

        // 載入樹狀目錄
        function loadFileTree() {
            const container = document.getElementById('fileTree');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';

            fetch('/api/files')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    treeData = data;
                    renderTree(data, container, 0);
                })
                .catch(function(err) {
                    container.innerHTML =
                        '<div style="padding:20px;color:#ef9a9a;text-align:center">❌ 載入失敗: ' + err.message + '</div>';
                });
        }

        // 載入檔案內容
        function loadFile(filepath) {
            currentFile = filepath;
            document.getElementById('filePath').textContent = filepath;
            setStatus('📂 載入中: ' + filepath);

            // 更新 active 狀態
            document.querySelectorAll('.tree-row').forEach(function(el) {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tree-row .name').forEach(function(el) {
                if (el.textContent === filepath.split('/').pop() || el.textContent === filepath.split('\\').pop()) {
                    el.parentElement.classList.add('active');
                }
            });

            fetch('/api/file/' + filepath)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        setStatus('❌ ' + data.error);
                        return;
                    }
                    fileContent = data.content;
                    editor.setValue(data.content);
                    setStatus('✅ 已載入: ' + filepath);
                })
                .catch(function(err) {
                    setStatus('❌ 載入失敗: ' + err.message);
                });
        }

        // 儲存檔案
        function saveFile() {
            if (!currentFile) {
                setStatus('⚠️ 請先選擇一個檔案');
                return;
            }
            const content = editor.getValue();
            setStatus('💾 儲存中: ' + currentFile);
            fetch('/api/file/' + currentFile, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'ok') {
                    fileContent = content;
                    setStatus('✅ 已儲存: ' + currentFile);
                } else {
                    setStatus('❌ 儲存失敗: ' + (data.error || '未知錯誤'));
                }
            })
            .catch(function(err) {
                setStatus('❌ 儲存失敗: ' + err.message);
            });
        }

        // 顯示差異
        function showDiff() {
            if (!currentFile) {
                setStatus('⚠️ 請先選擇一個檔案');
                return;
            }
            setStatus('📊 載入差異對比...');
            fetch('/api/diff/' + currentFile)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        setStatus('❌ ' + data.error);
                        return;
                    }
                    const oldContent = data.old_content || '';
                    const newContent = data.new_content || editor.getValue();
                    diffEditor.setModel({
                        original: monaco.editor.createModel(oldContent, 'python'),
                        modified: monaco.editor.createModel(newContent, 'python')
                    });
                    document.getElementById('diffPanel').classList.add('visible');
                    setStatus('📊 差異對比已顯示');
                })
                .catch(function(err) {
                    setStatus('❌ 差異載入失敗: ' + err.message);
                });
        }

        // 關閉差異面板
        function closeDiff() {
            document.getElementById('diffPanel').classList.remove('visible');
        }

        // 重新整理檔案列表
        function refreshFiles() {
            loadFileTree();
            setStatus('🔄 已重新整理');
        }

        // 設定狀態列
        function setStatus(msg) {
            document.getElementById('statusBar').textContent = msg;
        }

        // 格式化檔案大小
        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
    </script>
</body>
</html>
